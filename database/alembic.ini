# Alembic Configuration File for AegisMedBot Database Migrations
# 
# This file configures Alembic, a database migration tool for SQLAlchemy.
# It manages schema changes across different environments (development,
# staging, production) while preserving data integrity.

# Generic single-database configuration
[alembic]
# Path to migration scripts
# This directory contains all versioned migration files
script_location = migrations

# Template used for generating new migration files
# This creates standardized migration templates
file_template = %%(year)d_%%(month)02d_%%(day)02d_%%(hour)02d_%%(minute)02d_%%(second)02d_%%(slug)s

# Repository structure
# 'version_locations' allows multiple migration directories
# 'version_path_separator' defines how to combine paths
version_locations = %(here)s/migrations/versions
version_path_separator = ;

# Prevents creation of empty migrations
# This ensures all migrations actually change the schema
compare_type = True
compare_server_default = True

# Logging configuration for migration operations
[post_write_hooks]
# Hook to run black formatter after migration generation
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88

# SQLAlchemy configuration
# This section defines how Alembic connects to the database
[alembic:exclude]
# Tables to exclude from autogenerate (usually external or temporary tables)
tables = spatial_ref_sys

# Logging configuration
# Alembic uses Python's standard logging system
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine
# Propagate to root logger
propagate = 0

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S