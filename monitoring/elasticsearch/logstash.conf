"""
Logstash Configuration for Log Aggregation
This configuration file defines how logs are ingested, processed, and sent to Elasticsearch.
Logstash parses application logs, enriches them with metadata, and indexes them for search.
"""

input {
  # Input 1: Beats input for filebeat logs
  beats {
    port => 5044
    client_inactivity_timeout => 300
    ssl => false
    add_field => {
      "[@metadata][pipeline]" => "medintel-logs"
    }
  }
  
  # Input 2: TCP input for application logs
  tcp {
    port => 5000
    codec => json_lines
    type => "application"
    add_field => {
      "[@metadata][pipeline]" => "medintel-logs"
    }
  }
  
  # Input 3: UDP input for system logs
  udp {
    port => 5001
    codec => json
    type => "system"
    add_field => {
      "[@metadata][pipeline]" => "system-logs"
    }
  }
  
  # Input 4: HTTP input for custom log ingestion
  http {
    port => 8080
    ssl => false
    type => "api"
    add_field => {
      "[@metadata][pipeline]" => "medintel-logs"
    }
  }
}

filter {
  # Filter 1: Parse JSON logs
  if [type] == "application" {
    json {
      source => "message"
      target => "parsed"
      remove_field => ["message"]
    }
    
    # Extract fields from parsed JSON
    if [parsed] {
      mutate {
        add_field => {
          "log_level" => "%{[parsed][level]}"
          "component" => "%{[parsed][component]}"
          "request_id" => "%{[parsed][request_id]}"
          "user_id" => "%{[parsed][user_id]}"
          "conversation_id" => "%{[parsed][conversation_id]}"
          "agent_name" => "%{[parsed][agent_name]}"
          "processing_time_ms" => "%{[parsed][processing_time_ms]}"
        }
      }
      
      # Convert numeric fields
      mutate {
        convert => {
          "processing_time_ms" => "integer"
          "confidence_score" => "float"
        }
      }
    }
  }
  
  # Filter 2: Parse system logs
  if [type] == "system" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:timestamp} %{SYSLOGHOST:hostname} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:log_message}" }
      overwrite => ["message"]
    }
    
    # Add system-specific fields
    mutate {
      add_field => {
        "log_type" => "system"
        "environment" => "production"
      }
    }
  }
  
  # Filter 3: Parse API access logs
  if [type] == "api" {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }
    
    # Extract HTTP fields
    mutate {
      add_field => {
        "http_method" => "%{verb}"
        "http_path" => "%{request}"
        "http_status" => "%{response}"
        "http_user_agent" => "%{agent}"
        "client_ip" => "%{clientip}"
      }
      remove_field => ["verb", "request", "response", "agent", "clientip"]
    }
  }
  
  # Filter 4: Add Kubernetes metadata
  if [kubernetes] {
    mutate {
      add_field => {
        "namespace" => "%{[kubernetes][namespace]}"
        "pod_name" => "%{[kubernetes][pod_name]}"
        "container_name" => "%{[kubernetes][container_name]}"
      }
    }
  }
  
  # Filter 5: GeoIP enrichment for client IPs
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
      database => "/usr/share/logstash/GeoLite2-City.mmdb"
      add_field => ["[geoip][coordinates]", "%{[geoip][longitude]}"]
      add_field => ["[geoip][coordinates]", "%{[geoip][latitude]}"]
    }
    mutate {
      convert => ["[geoip][coordinates]", "float"]
    }
  }
  
  # Filter 6: Add timestamp if missing
  if ![timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "dd/MMM/yyyy:HH:mm:ss Z" ]
      target => "@timestamp"
      timezone => "UTC"
    }
  }
  
  # Filter 7: Add default fields
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:-production}"
      "app_version" => "${APP_VERSION:-1.0.0}"
    }
    remove_field => ["host", "parsed"]
  }
  
  # Filter 8: Anonymize PII data
  if [user_id] {
    mutate {
      add_field => {
        "user_id_hash" => "%{[user_id]}"
      }
    }
    fingerprint {
      source => ["user_id_hash"]
      target => "user_id_anonymized"
      method => "SHA256"
      key => "${FINGERPRINT_KEY}"
    }
    mutate {
      remove_field => ["user_id", "user_id_hash"]
    }
  }
  
  # Filter 9: Extract error stack traces
  if [log_level] == "ERROR" or [log_level] == "FATAL" {
    mutate {
      copy => { "message" => "stack_trace" }
    }
    
    # Limit stack trace size to prevent excessive storage
    mutate {
      gsub => [
        "stack_trace", "\n", "\\n",
        "stack_trace", "\r", "\\r"
      ]
      truncate => {
        "stack_trace" => 10000
      }
    }
  }
  
  # Filter 10: Add correlation ID from trace context
  if [trace_id] {
    mutate {
      add_field => {
        "trace_id" => "%{[trace_id]}"
        "span_id" => "%{[span_id]}"
      }
    }
  }
  
  # Filter 11: Rate limiting detection
  if [log_level] == "WARN" and [message] =~ /rate limit/ {
    mutate {
      add_tag => ["rate_limited"]
    }
    metrics {
      meter => "rate_limit_hits"
      add_tag => "metric"
    }
  }
  
  # Filter 12: Agent performance metrics extraction
  if [component] == "agent" and [processing_time_ms] {
    if [processing_time_ms] > 30000 {
      mutate {
        add_tag => ["slow_agent_response"]
      }
    }
  }
  
  # Filter 13: Database query logging
  if [component] == "database" and [query_duration_ms] {
    mutate {
      convert => { "query_duration_ms" => "integer" }
      add_field => {
        "slow_query" => "%{[query_duration_ms] > 1000 ? 'true' : 'false'}"
      }
    }
  }
}

output {
  # Output 1: Elasticsearch - Main log storage
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "medintel-logs-%{+YYYY.MM.dd}"
    user => "${ELASTIC_USER:-elastic}"
    password => "${ELASTIC_PASSWORD}"
    ssl => false
    manage_template => true
    template_name => "medintel-logs"
    template_overwrite => true
    ilm_enabled => true
    ilm_policy => "medintel-logs-policy"
    ilm_rollover_alias => "medintel-logs"
    action => "create"
    
    # Document routing for better performance
    routing => "%{[@metadata][routing]}"
    
    # Pipeline for preprocessing
    pipeline => "%{[@metadata][pipeline]}"
    
    # Retry policy
    retry_on_conflict => 3
    retry_initial_interval => 2
    retry_max_interval => 30
    
    # Bulk request configuration
    flush_size => 500
    idle_flush_time => 1
    workers => 4
  }
  
  # Output 2: Console for debugging (only in development)
  if "${ENVIRONMENT}" == "development" {
    stdout {
      codec => rubydebug
      id => "console-output"
    }
  }
  
  # Output 3: File output for backup (optional)
  file {
    path => "/var/log/medintel/backup-logs-%{+YYYY-MM-dd}.log"
    codec => line { format => "%{message}" }
    flush_interval => 5
  }
  
  # Output 4: Metrics to Prometheus (via push gateway)
  if "metric" in [tags] {
    http {
      url => "http://pushgateway:9091/metrics/job/logstash"
      http_method => "post"
      format => "json"
      message => "%{[metrics]}"
      headers => {
        "Content-Type" => "application/json"
      }
    }
  }
  
  # Output 5: Dead letter queue for failed events
  dead_letter_queue {
    path => "/var/lib/logstash/dead_letter_queue"
    max_size => 1024
    max_age => 86400
  }
}

# Pipeline configuration
pipeline {
  workers => 4
  batch_size => 125
  batch_delay => 50
}