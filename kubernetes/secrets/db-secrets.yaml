# Secret for storing sensitive database credentials
# Secrets are base64-encoded and should be managed securely

apiVersion: v1
kind: Secret
# Secret resource type - stores sensitive information

metadata:
  name: db-secrets
  # Name of this Secret
  
  namespace: medintel
  
  labels:
    app: aegismedbot
    component: database
    tier: credentials

type: Opaque
# Opaque type for arbitrary key-value pairs

data:
  # Data is base64 encoded for security
  # In production, use tools like kubectl or sealed-secrets
  
  postgres_user: YWVnaXNtZWRib3Q=
  # Base64 encoded: 'aegismedbot'
  # Database username
  
  postgres_password: cGFzc3dvcmQxMjM=
  # Base64 encoded: 'password123'
  # Strong password recommended in production
  
  redis_password: cmVkaXNwYXNzMTIz
  # Base64 encoded: 'redispass123'
  # Redis authentication password
  
  secret_key: c3VwZXItc2VjcmV0LWtleS1mb3Itand0LTIwMjQ=
  # Base64 encoded: 'super-secret-key-for-jwt-2024'
  # JWT signing key - must be strong and kept secret
  
  # Optional: Add more secrets as needed
  # For production, use external secrets management (Hashicorp Vault, AWS Secrets Manager)

---
# Additional secret for TLS certificates if using HTTPS
apiVersion: v1
kind: Secret

metadata:
  name: tls-secret
  namespace: medintel
  labels:
    app: aegismedbot
    component: tls
    tier: security

type: kubernetes.io/tls
# TLS type for storing SSL certificates

data:
  tls.crt: |
    # Base64 encoded TLS certificate
    # Replace with actual certificate in production
    
  tls.key: |
    # Base64 encoded TLS private key
    # Keep this extremely secure