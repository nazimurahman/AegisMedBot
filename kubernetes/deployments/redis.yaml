# Redis deployment for caching and session management
# Provides fast in-memory data storage for agent state and rate limiting

apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: medintel
  labels:
    app: aegismedbot
    component: redis
    tier: cache

spec:
  replicas: 1
  # Redis typically runs as single instance for consistency
  
  selector:
    matchLabels:
      app: aegismedbot
      component: redis
      tier: cache
  
  template:
    metadata:
      labels:
        app: aegismedbot
        component: redis
        tier: cache
      
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        # Redis 7 on Alpine for small footprint
        
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        
        command:
        - redis-server
        - --requirepass $(REDIS_PASSWORD)
        - --appendonly yes
        - --maxmemory 1gb
        - --maxmemory-policy allkeys-lru
        # Enable persistence and set memory policy
        # LRU (Least Recently Used) eviction for cache
        
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: redis_password
              # Reference secret for password
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        
        volumeMounts:
        - name: redis-storage
          mountPath: /data
          # Mount persistent storage for Redis data
        
        livenessProbe:
          # Check if Redis is alive
          
          tcpSocket:
            port: 6379
            # TCP connection test
            
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      - name: redis-exporter
        # Redis metrics exporter for Prometheus
        
        image: oliver006/redis_exporter:latest
        
        ports:
        - containerPort: 9121
          name: metrics
          protocol: TCP
        
        env:
        - name: REDIS_ADDR
          value: "redis-service:6379"
        
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: redis_password
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
          # PVC for Redis persistence 