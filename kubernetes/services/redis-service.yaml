# Service for Redis cache access

apiVersion: v1
kind: Service

metadata:
  name: redis-service
  namespace: medintel
  labels:
    app: aegismedbot
    component: redis
    tier: cache

spec:
  selector:
    app: aegismedbot
    component: redis
    tier: cache
  
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  
  type: ClusterIP
  # Only internal access for cache