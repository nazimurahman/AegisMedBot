# Service for Qdrant vector database access

apiVersion: v1
kind: Service

metadata:
  name: qdrant-service
  namespace: medintel
  labels:
    app: aegismedbot
    component: qdrant
    tier: vector-database

spec:
  selector:
    app: aegismedbot
    component: qdrant
    tier: vector-database
  
  ports:
  - name: http
    port: 6333
    targetPort: 6333
    protocol: TCP
  
  - name: grpc
    port: 6334
    targetPort: 6334
    protocol: TCP
  
  type: ClusterIP