# Service for Agent service access

apiVersion: v1
kind: Service

metadata:
  name: agents-service
  namespace: medintel
  labels:
    app: aegismedbot
    component: agents
    tier: ai-layer

spec:
  selector:
    app: aegismedbot
    component: agents
    tier: ai-layer
  
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
  
  type: ClusterIP