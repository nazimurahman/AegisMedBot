# Docker Compose configuration for local development and staging
# Production uses Kubernetes for orchestration
version: '3.8'

# Networks for service isolation and communication
networks:
  medintel-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes for persistent data storage
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ./data/postgres
      o: bind
  redis_data:
    driver: local
    driver_opts:
      type: none
      device: ./data/redis
      o: bind
  qdrant_data:
    driver: local
    driver_opts:
      type: none
      device: ./data/qdrant
      o: bind
  model_cache:
    driver: local
    driver_opts:
      type: none
      device: ./data/models
      o: bind
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      device: ./data/prometheus
      o: bind
  grafana_data:
    driver: local
    driver_opts:
      type: none
      device: ./data/grafana
      o: bind

services:
  # PostgreSQL Database for structured data
  postgres:
    image: postgres:15-alpine
    container_name: medintel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medintel123}
      POSTGRES_DB: ${POSTGRES_DB:-medintel}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - medintel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medintel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis Cache for session management and real-time data
  redis:
    image: redis:7-alpine
    container_name: medintel-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medintel-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Qdrant Vector Database for semantic search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medintel-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - medintel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Backend API Service
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: medintel-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      POSTGRES_SERVER: postgres
      POSTGRES_USER: ${POSTGRES_USER:-medintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medintel123}
      POSTGRES_DB: ${POSTGRES_DB:-medintel}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/app/models
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - medintel-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # AI Agents Service
  agents:
    build:
      context: ..
      dockerfile: docker/agents/Dockerfile
    container_name: medintel-agents
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MODEL_CACHE_DIR: /app/models
      TRANSFORMERS_CACHE: /app/cache/transformers
      HF_HOME: /app/cache/huggingface
      TORCH_HOME: /app/cache/torch
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-}
    ports:
      - "8001:8001"
    volumes:
      - model_cache:/app/models
      - ./agents/logs:/app/logs
      - ./agents/cache:/app/cache
    depends_on:
      - redis
      - qdrant
      - backend
    networks:
      - medintel-network
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # RAG Service
  rag:
    build:
      context: ..
      dockerfile: docker/rag/Dockerfile
    container_name: medintel-rag
    restart: unless-stopped
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      BATCH_SIZE: 32
    ports:
      - "8002:8002"
    volumes:
      - model_cache:/app/models
      - ./documents:/app/documents
      - ./rag_system/logs:/app/logs
    depends_on:
      - qdrant
    networks:
      - medintel-network

  # Frontend Gradio Application
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: medintel-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000
      WS_URL: ws://backend:8000
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
    ports:
      - "7860:7860"
    volumes:
      - ./frontend/logs:/app/logs
    depends_on:
      - backend
    networks:
      - medintel-network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    container_name: medintel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/static:/usr/share/nginx/html/static:ro
    depends_on:
      - frontend
      - backend
      - agents
      - rag
    networks:
      - medintel-network

  # Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: medintel-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - medintel-network

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: medintel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_SERVER_ROOT_URL: https://grafana.medintel.example.com
    volumes:
      - ./monitoring/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - medintel-network
    depends_on:
      - prometheus

  # Elasticsearch for Log Aggregation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: medintel-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.monitoring.enabled=true
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - medintel-network

  # Kibana Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: medintel-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana.medintel.example.com
    ports:
      - "5601:5601"
    networks:
      - medintel-network
    depends_on:
      - elasticsearch

  # Logstash Log Processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.0
    container_name: medintel-logstash
    restart: unless-stopped
    volumes:
      - ./monitoring/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logs:/var/log/medintel:ro
    ports:
      - "5000:5000"
    networks:
      - medintel-network
    depends_on:
      - elasticsearch

  # PostgreSQL Backup Service
  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: medintel-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-medintel}
      POSTGRES_USER: ${POSTGRES_USER:-medintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medintel123}
      POSTGRES_EXTRA_OPTS: -Z6 --schema=public --blobs
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups
    networks:
      - medintel-network
    depends_on:
      - postgres