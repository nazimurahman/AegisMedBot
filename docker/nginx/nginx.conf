# NGINX configuration for reverse proxy and load balancing
# Handles SSL termination, routing, and static file serving

# Define upstream services for load balancing
# Each service runs in its own container
upstream backend_servers {
    # Least connections algorithm for better load distribution
    least_conn;
    
    # Backend API servers
    server backend:8000 max_fails=3 fail_timeout=30s;
    
    # Keep backup server if primary fails
    server backend:8000 backup;
}

upstream agent_servers {
    least_conn;
    server agents:8001 max_fails=3 fail_timeout=30s;
}

upstream rag_servers {
    least_conn;
    server rag:8002 max_fails=3 fail_timeout=30s;
}

upstream frontend_servers {
    least_conn;
    server frontend:7860 max_fails=3 fail_timeout=30s;
}

# Main server block for HTTP traffic
# Redirects all HTTP to HTTPS for security
server {
    listen 80;
    listen [::]:80;
    server_name medintel.example.com;
    
    # Redirect all HTTP requests to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server block with SSL configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name medintel.example.com;
    
    # SSL certificate paths
    # These should be mounted as secrets in production
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # Strong SSL configuration for security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Enable gzip compression for faster responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    
    # Client settings
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # Logging configuration
    access_log /var/log/nginx/medintel_access.log;
    error_log /var/log/nginx/medintel_error.log;
    
    # Root location - serves frontend application
    location / {
        proxy_pass http://frontend_servers;
        proxy_http_version 1.1;
        
        # WebSocket support for real-time chat
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering settings
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # API endpoints - routed to backend service
    location /api/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API specific timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
        
        # Rate limiting for API endpoints
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
    }
    
    # WebSocket endpoint for real-time chat
    location /ws {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        # Required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Longer timeouts for WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # Agent service endpoints
    location /agents/ {
        proxy_pass http://agent_servers;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Longer timeouts for agent processing
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    # RAG service endpoints
    location /rag/ {
        proxy_pass http://rag_servers;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeouts for retrieval operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 90s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        proxy_pass http://frontend_servers;
        proxy_set_header Host $host;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Map for WebSocket connection upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}